<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftPOS - Login</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Neon Auth SDK (for optional Neon Auth integration) -->
  <script src="https://cdn.jsdelivr.net/npm/@neondatabase/auth@0.5.2/dist/auth.global.js" crossorigin></script>

  <!-- Custom Styles -->
  <style>
    body {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      min-height: 100vh;
    }

    .login-card {
      backdrop-filter: blur(10px);
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="flex items-center justify-center">
  <div
    class="login-card bg-white/10 backdrop-blur-sm rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">
    <!-- Logo and Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 rounded-full mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">SwiftPOS</h1>
      <p class="text-gray-300 mt-2">Point of Sale Application</p>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
        <input type="email" id="email" name="email" required placeholder="admin@swiftpos.com"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <!-- Error Message -->
      <div id="error-message" class="hidden p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
        <p id="error-text" class="text-red-200 text-sm text-center"></p>
      </div>

      <!-- Success Message -->
      <div id="success-message" class="hidden p-4 bg-green-500/20 border border-green-500/50 rounded-lg">
        <p id="success-text" class="text-green-200 text-sm text-center"></p>
      </div>

      <button type="submit" id="login-btn"
        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors duration-200 flex items-center justify-center">
        <span>Sign In</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
      </button>
    </form>

    <!-- Register Link -->
    <div class="mt-6 text-center">
      <p class="text-gray-300 text-sm">
        Don't have an account?
        <a href="#" id="register-link" class="text-blue-400 hover:text-blue-300 font-medium">Register Tenant</a>
      </p>
    </div>

    <!-- Neon Auth Info -->
    <div class="mt-6 p-4 bg-blue-500/20 rounded-lg">
      <p class="text-sm text-blue-200 text-center">
        Secure authentication with JWT tokens
      </p>
    </div>
  </div>

  <!-- Registration Modal -->
  <div id="register-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div
      class="login-card bg-white/10 backdrop-blur-sm rounded-2xl shadow-2xl p-8 w-full max-w-lg border border-white/20 m-4 fade-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Register Tenant</h2>
        <button id="close-modal" class="text-gray-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label for="tenant-name" class="block text-sm font-medium text-gray-300 mb-2">Business Name</label>
          <input type="text" id="tenant-name" name="tenant-name" required placeholder="My Business"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="tenant-slug" class="block text-sm font-medium text-gray-300 mb-2">URL Slug</label>
          <input type="text" id="tenant-slug" name="tenant-slug" required placeholder="my-business" pattern="[a-z0-9-]+"
            title="Lowercase letters, numbers, and hyphens only"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="reg-email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input type="email" id="reg-email" name="reg-email" required placeholder="admin@mybusiness.com"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="reg-full-name" class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
          <input type="text" id="reg-full-name" name="reg-full-name" required placeholder="John Doe"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="reg-password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input type="password" id="reg-password" name="reg-password" required minlength="8" placeholder="••••••••"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
        </div>

        <!-- Register Error/Success Messages -->
        <div id="reg-error-message" class="hidden p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
          <p id="reg-error-text" class="text-red-200 text-sm text-center"></p>
        </div>

        <div id="reg-success-message" class="hidden p-4 bg-green-500/20 border border-green-500/50 rounded-lg">
          <p id="reg-success-text" class="text-green-200 text-sm text-center"></p>
        </div>

        <button type="submit" id="register-btn"
          class="w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors duration-200">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <!-- Tauri API Script -->
  <script>
    const { invoke } = window.__TAURI__.core;

    // DOM Elements
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const registerModal = document.getElementById('register-modal');
    const registerLink = document.getElementById('register-link');
    const closeModalBtn = document.getElementById('close-modal');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const regErrorMessage = document.getElementById('reg-error-message');
    const regSuccessMessage = document.getElementById('reg-success-message');

    // Show error message
    function showError(message) {
      errorMessage.classList.remove('hidden');
      document.getElementById('error-text').textContent = message;
      successMessage.classList.add('hidden');
    }

    // Show success message
    function showSuccess(message) {
      successMessage.classList.remove('hidden');
      document.getElementById('success-text').textContent = message;
      errorMessage.classList.add('hidden');
    }

    // Hide all messages
    function hideMessages() {
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');
      regErrorMessage.classList.add('hidden');
      regSuccessMessage.classList.add('hidden');
    }

    // Login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span>Signing in...</span>';

      try {
        const response = await invoke('login', {
          request: {
            email: email,
            password: password
          }
        });

        // Store token in localStorage
        localStorage.setItem('auth_token', response.token);
        localStorage.setItem('user', JSON.stringify(response.user));
        if (response.tenant) {
          localStorage.setItem('tenant', JSON.stringify(response.tenant));
        }

        showSuccess('Login successful! Redirecting...');

        // Redirect to dashboard after short delay
        setTimeout(() => {
          // In a real app, redirect to dashboard
          console.log('Login successful:', response);
          alert('Login successful! Token: ' + response.token.substring(0, 20) + '...');
        }, 500);

      } catch (error) {
        console.error('Login error:', error);
        showError(error.toString());
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>Sign In</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>';
      }
    });

    // Registration form submission
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('tenant-name').value;
      const slug = document.getElementById('tenant-slug').value.toLowerCase().replace(/[^a-z0-9-]/g, '-');
      const email = document.getElementById('reg-email').value;
      const fullName = document.getElementById('reg-full-name').value;
      const password = document.getElementById('reg-password').value;
      const registerBtn = document.getElementById('register-btn');

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<span>Creating account...</span>';

      try {
        const response = await invoke('register_tenant', {
          request: {
            name: name,
            slug: slug,
            email: email,
            full_name: fullName,
            password: password
          }
        });

        // Store token in localStorage
        localStorage.setItem('auth_token', response.token);
        localStorage.setItem('user', JSON.stringify(response.user));
        if (response.tenant) {
          localStorage.setItem('tenant', JSON.stringify(response.tenant));
        }

        regSuccessMessage.classList.remove('hidden');
        document.getElementById('reg-success-text').textContent = 'Account created successfully! Redirecting...';

        // Close modal and redirect after short delay
        setTimeout(() => {
          registerModal.classList.add('hidden');
          console.log('Registration successful:', response);
          alert('Registration successful! Token: ' + response.token.substring(0, 20) + '...');
        }, 1000);

      } catch (error) {
        console.error('Registration error:', error);
        regErrorMessage.classList.remove('hidden');
        document.getElementById('reg-error-text').textContent = error.toString();
      } finally {
        registerBtn.disabled = false;
        registerBtn.innerHTML = 'Create Account';
      }
    });

    // Open registration modal
    registerLink.addEventListener('click', (e) => {
      e.preventDefault();
      registerModal.classList.remove('hidden');
    });

    // Close registration modal
    closeModalBtn.addEventListener('click', () => {
      registerModal.classList.add('hidden');
      hideMessages();
    });

    // Close modal on background click
    registerModal.addEventListener('click', (e) => {
      if (e.target === registerModal) {
        registerModal.classList.add('hidden');
        hideMessages();
      }
    });

    // Auto-generate slug from tenant name
    document.getElementById('tenant-name').addEventListener('input', (e) => {
      const slug = e.target.value.toLowerCase().replace(/[^a-z0-9-]/g, '-');
      document.getElementById('tenant-slug').value = slug;
    });

    // Check if user is already logged in
    const token = localStorage.getItem('auth_token');
    if (token) {
      console.log('User is already logged in');
    }
  </script>
</body>

</html>
