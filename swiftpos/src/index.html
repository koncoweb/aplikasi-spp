<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftPOS - Login</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <style>
    body {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      min-height: 100vh;
    }

    .login-card {
      backdrop-filter: blur(10px);
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 2px solid white;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="flex items-center justify-center">
  <div
    class="login-card bg-white/10 backdrop-blur-sm rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">
    <!-- Logo and Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 rounded-full mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">SwiftPOS</h1>
      <p class="text-gray-300 mt-2">Point of Sale Application</p>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
        <input type="email" id="email" name="email" required placeholder="admin@example.com"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <!-- Error Message -->
      <div id="error-message" class="hidden p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
        <p id="error-text" class="text-red-200 text-sm text-center"></p>
      </div>

      <!-- Success Message -->
      <div id="success-message" class="hidden p-4 bg-green-500/20 border border-green-500/50 rounded-lg">
        <p id="success-text" class="text-green-200 text-sm text-center"></p>
      </div>

      <button type="submit" id="login-btn"
        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors duration-200 flex items-center justify-center">
        <span>Sign In</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
      </button>
    </form>

    <!-- Register Link -->
    <div class="mt-6 text-center">
      <p class="text-gray-300 text-sm">
        Don't have an account?
        <a href="#" id="register-link" class="text-blue-400 hover:text-blue-300 font-medium">Sign Up</a>
      </p>
    </div>

    <!-- Neon Auth Info -->
    <div class="mt-6 p-4 bg-blue-500/20 rounded-lg">
      <p class="text-sm text-blue-200 text-center">
        Secured with Neon Auth
      </p>
    </div>
  </div>

  <!-- Registration Modal -->
  <div id="register-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div
      class="login-card bg-white/10 backdrop-blur-sm rounded-2xl shadow-2xl p-8 w-full max-w-lg border border-white/20 m-4 fade-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Create Account</h2>
        <button id="close-modal" class="text-gray-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label for="reg-name" class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
          <input type="text" id="reg-name" name="reg-name" required placeholder="John Doe"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="reg-email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input type="email" id="reg-email" name="reg-email" required placeholder="admin@example.com"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <div>
          <label for="reg-password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input type="password" id="reg-password" name="reg-password" required minlength="8" placeholder="••••••••"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
        </div>

        <div>
          <label for="reg-confirm-password" class="block text-sm font-medium text-gray-300 mb-2">Confirm
            Password</label>
          <input type="password" id="reg-confirm-password" name="reg-confirm-password" required minlength="8"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <!-- Register Error/Success Messages -->
        <div id="reg-error-message" class="hidden p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
          <p id="reg-error-text" class="text-red-200 text-sm text-center"></p>
        </div>

        <div id="reg-success-message" class="hidden p-4 bg-green-500/20 border border-green-500/50 rounded-lg">
          <p id="reg-success-text" class="text-green-200 text-sm text-center"></p>
        </div>

        <button type="submit" id="register-btn"
          class="w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors duration-200">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <!-- Main App (Hidden until logged in) -->
  <div id="app-container" class="hidden w-full h-full">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-white">Welcome to SwiftPOS</h1>
      <p id="welcome-user" class="text-gray-300 mt-4"></p>
      <button id="logout-btn" class="mt-6 px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
        Sign Out
      </button>
    </div>
  </div>

  <!-- Neon Auth Script -->
  <script src="main.js"></script>

  <script>
    // DOM Elements
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const registerModal = document.getElementById('register-modal');
    const registerLink = document.getElementById('register-link');
    const closeModalBtn = document.getElementById('close-modal');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const regErrorMessage = document.getElementById('reg-error-message');
    const regSuccessMessage = document.getElementById('reg-success-message');
    const appContainer = document.getElementById('app-container');
    const loginContainer = document.querySelector('.login-card').parentElement;

    // Show error message
    function showError(message, isRegister = false) {
      if (isRegister) {
        regErrorMessage.classList.remove('hidden');
        document.getElementById('reg-error-text').textContent = message;
        regSuccessMessage.classList.add('hidden');
      } else {
        errorMessage.classList.remove('hidden');
        document.getElementById('error-text').textContent = message;
        successMessage.classList.add('hidden');
      }
    }

    // Show success message
    function showSuccess(message, isRegister = false) {
      if (isRegister) {
        regSuccessMessage.classList.remove('hidden');
        document.getElementById('reg-success-text').textContent = message;
        regErrorMessage.classList.add('hidden');
      } else {
        successMessage.classList.remove('hidden');
        document.getElementById('success-text').textContent = message;
        errorMessage.classList.add('hidden');
      }
    }

    // Hide all messages
    function hideMessages() {
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');
      regErrorMessage.classList.add('hidden');
      regSuccessMessage.classList.add('hidden');
    }

    // Update button state
    function setButtonState(button, isLoading, defaultText) {
      button.disabled = isLoading;
      if (isLoading) {
        button.innerHTML = '<div class="spinner mr-2"></div><span>Please wait...</span>';
      } else {
        button.innerHTML = defaultText;
      }
    }

    // Show app after successful login
    function showApp(user) {
      loginContainer.classList.add('hidden');
      registerModal.classList.add('hidden');
      appContainer.classList.remove('hidden');
      document.getElementById('welcome-user').textContent = `Hello, ${user.name || user.email}!`;
    }

    // Show login form
    function showLogin() {
      appContainer.classList.add('hidden');
      loginContainer.classList.remove('hidden');
    }

    // Login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');

      setButtonState(loginBtn, true, '<span>Sign In</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>');

      try {
        const result = await window.SwiftPOS.Auth.signIn(email, password);

        if (result.success) {
          showSuccess('Login successful! Redirecting...');

          // Show app
          showApp(result.user);

          console.log('Login successful:', result);
        } else {
          showError(result.error || 'Login failed');
        }
      } catch (error) {
        console.error('Login error:', error);
        showError(error.message || 'An error occurred during login');
      } finally {
        setButtonState(loginBtn, false, '<span>Sign In</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>');
      }
    });

    // Registration form submission
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;
      const registerBtn = document.getElementById('register-btn');

      // Validate passwords match
      if (password !== confirmPassword) {
        showError('Passwords do not match', true);
        return;
      }

      setButtonState(registerBtn, true, 'Creating account...');

      try {
        const result = await window.SwiftPOS.Auth.signUp(email, password, name);

        if (result.success) {
          if (result.requiresVerification) {
            showSuccess('Account created! Please check your email to verify your account.', true);
          } else {
            // Show app
            showApp(result.user);
            console.log('Registration successful:', result);
          }
        } else {
          showError(result.error || 'Registration failed', true);
        }
      } catch (error) {
        console.error('Registration error:', error);
        showError(error.message || 'An error occurred during registration', true);
      } finally {
        setButtonState(registerBtn, false, 'Create Account');
      }
    });

    // Logout button
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await window.SwiftPOS.Auth.signOut();
      showLogin();
    });

    // Open registration modal
    registerLink.addEventListener('click', (e) => {
      e.preventDefault();
      registerModal.classList.remove('hidden');
    });

    // Close registration modal
    closeModalBtn.addEventListener('click', () => {
      registerModal.classList.add('hidden');
      hideMessages();
    });

    // Close modal on background click
    registerModal.addEventListener('click', (e) => {
      if (e.target === registerModal) {
        registerModal.classList.add('hidden');
        hideMessages();
      }
    });

    // Check if user is already logged in on page load
    window.addEventListener('DOMContentLoaded', async () => {
      console.log('SwiftPOS initialized');

      // Verify existing session
      const session = await window.SwiftPOS.Auth.verifySession();
      if (session.valid) {
        console.log('User session verified:', session.user);
        showApp(session.user);
      } else {
        console.log('No valid session, showing login');
      }
    });
  </script>
</body>

</html>
